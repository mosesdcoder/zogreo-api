apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
  namespace: moodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      initContainers:
        # Wait for MariaDB to be ready before Moodle starts
        - name: wait-for-mariadb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z moodle-mariadb 3306; do
                echo "Waiting for mariadb..."; sleep 3;
              done
      containers:
        - name: moodle
          image: docker.io/lthub/moodle:latest
          ports:
            - containerPort: 80
          env:
            # Database (MariaDB)
            - name: MOODLE_DB_TYPE
              value: "mariadb"
            - name: MOODLE_DB_HOST
              value: "moodle-mariadb"
            - name: MOODLE_DB_PORT
              value: "3306"
            - name: MOODLE_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_DB_NAME
            - name: MOODLE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_DB_USER
            - name: MOODLE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_DB_PASSWORD
            # Site
            - name: MOODLE_URL
              value: "https://lms.zogreo.online"
            - name: MOODLE_SITE_FULLNAME
              value: "Zogreo Learning Portal"
            - name: MOODLE_SITE_SHORTNAME
              value: "ZLP"
            # Admin account (set once on first install)
            - name: MOODLE_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_ADMIN_USER
            - name: MOODLE_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_ADMIN_PASS
            - name: MOODLE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_ADMIN_EMAIL
            # Reverse proxy (Cloudflare + nginx ingress terminate SSL)
            - name: MOODLE_REVERSE_PROXY
              value: "true"
            - name: MOODLE_SSL_PROXY
              value: "true"
            # Redis cache (reuse existing Redis in zegreo-api namespace)
            - name: MOODLE_REDIS_HOST
              value: "redis.zegreo-api.svc.cluster.local"
            - name: REDIS_HOST
              value: "redis.zegreo-api.svc.cluster.local"
            - name: MOODLE_REDIS_PORT
              value: "6379"
            - name: MOODLE_REDIS_DB
              value: "1"
            - name: MOODLE_DISABLE_UPDATE_AUTODEPLOY
              value: "true"
          volumeMounts:
            - name: moodledata
              mountPath: /moodledata
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /login/index.php
              port: 80
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /login/index.php
              port: 80
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: moodledata
          persistentVolumeClaim:
            claimName: moodle-data-pvc

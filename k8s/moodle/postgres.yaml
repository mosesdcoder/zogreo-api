apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: moodle-postgres-pvc
  namespace: moodle
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle-postgres
  namespace: moodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle-postgres
  template:
    metadata:
      labels:
        app: moodle-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: MOODLE_DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: POSTGRESQL_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: moodle-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: moodle-postgres
  namespace: moodle
spec:
  selector:
    app: moodle-postgres
  ports:
    - port: 5432
      targetPort: 5432
